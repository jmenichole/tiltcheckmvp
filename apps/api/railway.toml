# Railway config for API service
# In Railway dashboard: Service → Settings → Config file path → /apps/api/railway.toml
# Repo root must be monorepo root (not apps/api)

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @tiltcheck/api build"

[deploy]
startCommand = "pnpm --filter @tiltcheck/api start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"

# Railway config for Web service
# In Railway dashboard: Service → Settings → Config file path → /apps/web/railway.toml
# Repo root must be monorepo root (not apps/web)

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @tiltcheck/web... build"

[deploy]
startCommand = "pnpm --filter @tiltcheck/web start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
